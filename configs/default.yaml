# Default configuration for LiDAR SLAM HD Map Pipeline

data:
  kitti_root: "~/data/kitti/odometry/dataset"
  sequence: "00"

kiss_icp:
  max_range: 100.0
  min_range: 5.0
  voxel_size: 1.0

gtsam:
  odom_sigmas: [0.1, 0.1, 0.1, 0.01, 0.01, 0.01]  # tx,ty,tz,rx,ry,rz
  prior_sigmas: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
  gps_sigmas: [0.5, 0.5, 1.0]  # x, y, z

loop_closure:
  mode: v2                       # v1=distance, v2=scan_context, both=combined
  distance_threshold: 15.0
  min_frame_gap: 100
  icp_fitness_threshold: 0.9
  scan_context:
    num_rings: 20
    num_sectors: 60
    max_range: 80.0
    distance_threshold: 0.4      # SC cosine distance threshold; ICP@0.9 is real quality gate
    top_k: 25                    # ring-key candidates to re-rank per query
    query_stride: 1              # query every N-th frame (1 = every frame for max recall)
    max_matches_per_query: 5     # cap per-frame matches to control ICP cost; 0 = unlimited

ekf:
  process_noise_pos: 0.1
  process_noise_vel: 0.5
  process_noise_rot: 0.01
  measurement_noise_pos: 0.05
  measurement_noise_rot: 0.01

mapping:
  master_voxel_size: 0.10      # 主缓存体素 (m); Stage 4→5 边界, Stage 5 从此降采样到 voxel_size
                               # 实测 voxel=0.05 在 seq 00 触发 OOM (13.7 GB 峰值 > 15 GB RAM)
                               # 0.10 仍比 working 0.15 细, 峰值 ~2 GB 安全
  voxel_size: 0.15             # Stage 5 工作体素 (m); 匹配车道线宽
  max_range: 30.0              # 单帧点云最大距离过滤 (m); 远点 ICP 不确定
  downsample_every: 500        # 每 N 帧触发一次增量 merge
  road_z_min: -2.0             # 路面 z 下界 (Velodyne 帧, 地面约 -1.73m)
  road_z_max: -1.5             # 路面 z 上界
  intensity_threshold: 0.40    # 车道线反射率阈值 (KITTI reflectance in [0,1])
  dbscan_eps: 0.7              # DBSCAN 聚类半径 (m); 桥接车道虚线内部碎片
  dbscan_min_points: 40        # 最小核心邻域; 过滤道路反光噪点
  curb_grid_size: 0.30         # 路缘检测 xy 网格边长 (m); 2× voxel_size 避免 snap 混叠
  curb_z_min: -2.0             # 路缘 z 下界 (与 road_z_min 一致)
  curb_z_max: -1.2             # 路缘 z 上界 (ground+0.5m, 捕获台阶上沿)
  curb_height_min: 0.10        # 最小台阶高度 (m); 0.08 会踩 voxel=0.15 snap 噪声 (~0.03 σ)
  curb_height_max: 0.25        # 最大台阶高度 (m); 更高归为墙/车/绿化带
  curb_road_z_top: -1.55       # 路面上沿 z (m); cell 必须跨越此 z (zmin<=top<zmax) 才算 curb
                               # 比 road_z_max=-1.5 低 5cm 以捕捉极矮 (~5cm) curb
  curb_dbscan_eps: 0.6         # eps>=0.7 在稀疏候选上形成 2m 圆形 blob (lin~0.7)
                               # eps=0.6 + mp=10 + trim_k=1.2 让 cluster 沿 curb 线延伸
                               # 实测 (g=0.30 grid): good rate 21% vs eps=0.5 的 16%
  curb_dbscan_min_points: 10   # 候选 ~2 pts/cell, mp=10 ≈ 5 cells (~1m 沿线)
  curb_trim_k: 1.2             # MAD trim 比 lane (k=2.5) 紧, 把 blob 修成线
                               # k=1.2 对应 ~88% Gaussian 保留率, 砍掉对角延伸点

export:
  lat0: 49.0                       # 假 WGS84 原点 (KITTI Karlsruhe 附近); seq 00 无真实 GPS
  lon0: 8.4
  polyline_bin_size: 0.5           # m; 线状簇分箱宽度 (lane/curb 共用)
  polyline_simplify_epsilon: 0.05  # m; RDP 简化容差; 0 禁用; 0.05 低于 Velodyne 噪声
  lane:                            # 车道线分类阈值 (PCA 三档: thin/thick/area)
    min_linearity: 0.75            # PCA xy linearity 下限
    min_length: 1.0                # m; 主轴跨度低于此则丢为 noise
    line_thin_max_thickness: 0.8   # m; 匹配 dbscan_eps=0.7 + voxel=0.15 自然 snap spread
    line_thick_max_thickness: 2.0  # m; 超过此值归为 area (人行横道/路口涂装)
  curb:                            # 路缘石分类阈值 (单一类别)
                                   # 阈值依据 Stage 5 v4 实测 + stage6-curb-v1/v2/v3 benchmark
                                   # v4 整体: median lin 0.91, median thk 0.46m, median len 1.4m
    min_linearity: 0.75            # 与 lane 一致; "good" 0.80 过严, 长尾分布 lin 跨 0.85-0.97
    min_length: 1.0                # m; v4 中位 1.4m, 1.5m 把一半 cluster 切掉; 1.0 是 polyline_bin 2x
    max_thickness: 0.7             # m; "good" 上限 0.5 → 0.7; 吸收 v4 thickness 长尾 (max ~1.0m)
    trim_k: 1.0                    # 二次 minor-axis MAD trim sigma 系数 (Stage 5 v4 已用 k=1.2 trim)
                                   # 仅作用于一次 PCA 后 thickness 单一原因失败的 cluster
                                   # k=1.0 比 v4 紧, 实测 seq 06/01/10 救回 12+4+3 个 thick-tail cluster

cache:
  enabled: true
  root: "cache/kitti"          # 相对仓库根; Stage 1-5 分层缓存
                               # 见 src/cache/layered_cache.py

output:
  dir: "results"
