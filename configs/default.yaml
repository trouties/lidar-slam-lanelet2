# Default configuration for LiDAR SLAM HD Map Pipeline

data:
  kitti_root: "~/data/kitti/odometry/dataset"
  sequence: "00"

kiss_icp:
  max_range: 100.0
  min_range: 5.0
  voxel_size: 1.0

gtsam:
  odom_sigmas: [0.1, 0.1, 0.1, 0.01, 0.01, 0.01]  # tx,ty,tz,rx,ry,rz
  prior_sigmas: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
  gps_sigmas: [0.5, 0.5, 1.0]  # x, y, z

loop_closure:
  distance_threshold: 15.0
  min_frame_gap: 100
  icp_fitness_threshold: 0.3

ekf:
  process_noise_pos: 0.1
  process_noise_vel: 0.5
  process_noise_rot: 0.01
  measurement_noise_pos: 0.05
  measurement_noise_rot: 0.01

mapping:
  voxel_size: 0.1

output:
  dir: "results"
