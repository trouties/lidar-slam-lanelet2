# Default configuration for LiDAR SLAM & Lanelet2 Lane-Level Mapping Pipeline

data:
  kitti_root: "~/data/kitti/odometry/dataset"
  sequence: "00"

kiss_icp:
  max_range: 100.0
  min_range: 5.0
  voxel_size: 1.0

gtsam:
  odom_sigmas: [0.1, 0.1, 0.1, 0.01, 0.01, 0.01]  # tx,ty,tz,rx,ry,rz
  prior_sigmas: [0.01, 0.01, 0.01, 0.001, 0.001, 0.001]
  loop_closure_sigmas: [0.05, 0.05, 0.05, 0.005, 0.005, 0.005]  # ICP-verified; tighter than odom
  gps_sigmas: [0.5, 0.5, 1.0]  # x, y, z

sup07:
  # LiDAR degeneracy detection (Zhang 2016 ICRA-inspired).
  # When enabled=false, Stage 2/3 behavior is identical to legacy (optimized cache bytes unchanged).
  # Enabled by default as of SUP-07 Iter3 (2026-04-18): the directional sigma_mode
  # path is APE-neutral on non-degenerate frames and strictly improves Seq 00.
  enabled: true
  # Analyzer parameters locked (tuned via tune_sup07, see refs/sup-notes.md SUP-07):
  # voxel_size=0.3 / min_quality=0.5 / normal_k=15 raises Seq 01 p50 cond
  # from 4.4 to 12.4 (>2×Seq 00 p95), passing SUP-07 criterion 1 acceptance.
  max_correspondences: 5000       # per-frame NN sampling cap
  normal_k: 15                    # neighborhood PCA normal estimation
  max_nn_dist: 1.0                # m; drop NN correspondences beyond this distance
  voxel_size: 0.3                 # m; source/target pre-downsample voxel
  min_quality: 0.5                # PCA quality gate (l2-l1)/l3; planar normals only
  # Degeneracy trigger threshold (fit from eval_sup07 baseline; equals Seq 00 p95)
  cond_threshold: 5.514
  # Degeneracy response: only inflate tx/ty/tz; keep rotation (KISS-ICP rotation remains reliable on highway)
  sigma_inflation_factor: 10.0
  # Inflation strategy:
  #   "uniform"     — scale tx/ty/tz diagonal by inflation_factor (legacy, 2026-04-15 baseline)
  #   "directional" — full 6x6 covariance, inflating only the variance along the
  #                   least-observed ICP Hessian eigenvector (Zhang 2016 ICRA-faithful).
  # Directional keeps the well-observed lateral / vertical translation tight,
  # relaxing only the forward direction on highway frames — see refs/sup-notes.md SUP-07.
  sigma_mode: "directional"
  # Hysteresis: EMA smoothing + minimum consecutive exceedance. Prevents the
  # detector from degenerating into an always-on flag (Seq 01 went from
  # 1078/1101=97.9% triggered to localized spikes after hysteresis). See
  # refs/sup-notes.md SUP-07 "Hysteresis" subsection.
  ema_alpha: 0.3
  min_consecutive: 5

imu:
  # Conservative noise: LiDAR between-factors dominate; IMU adds velocity/bias regularization.
  # Tighter values (e.g. 0.3/0.03) cause divergence on KITTI Raw because:
  #   (1) timestamp alignment is approximate (Odometry t=0 ≈ Raw drive t=0, not exact),
  #   (2) OxTS outputs filtered navigation data, not raw IMU — preintegration model mismatch,
  #   (3) R_imu_to_velo calibration residuals become systematic errors when IMU is trusted tightly.
  # Result with 5.0/0.5: tight APE 9.22 m vs loose 11.53 m (-20%). Keep these values.
  accel_noise_sigma: 5.0    # m/s²; intentionally loose — see note above
  gyro_noise_sigma: 0.5     # rad/s; intentionally loose — see note above
  accel_bias_sigma: 0.1     # random walk σ between consecutive LiDAR keyframes
  gyro_bias_sigma: 0.01     # random walk σ between consecutive LiDAR keyframes

loop_closure:
  mode: v2                       # v1=distance, v2=scan_context, both=combined
  distance_threshold: 15.0
  min_frame_gap: 100
  icp_fitness_threshold: 0.9
  # Voxel size (m) for pre-ICP downsample. SUP-03 round-2 locked for
  # KITTI 64-beam Velodyne; nuScenes 32-beam typically wants ~0.5.
  icp_downsample_voxel: 1.0
  scan_context:
    num_rings: 20
    num_sectors: 60
    max_range: 80.0
    distance_threshold: 0.4      # SC cosine distance threshold; ICP@0.9 is real quality gate
    top_k: 25                    # ring-key candidates to re-rank per query
    query_stride: 1              # query every N-th frame (1 = every frame for max recall)
    max_matches_per_query: 5     # cap per-frame matches to control ICP cost; 0 = unlimited
  # Switchable Constraints on loop closure factors (Sünderhauf 2012 / Agarwal 2013 DCS).
  # Wraps *only* the loop closure BetweenFactor noise in an M-estimator so
  # false-positive closures (Seq 00 v2 P=0.967 ⇒ ~88/2635 FP) are down-weighted
  # rather than bent into the trajectory. Odometry / prior / IMU factors stay
  # pure Gaussian.
  #
  # Defaults (kernel=none, scale=1.0) are a no-op and are stripped from the
  # optimized-cache hash (src/cache/layered_cache.py) so SUP-04 / SUP-07 caches
  # remain bit-exact.
  robust_kernel: none            # none | huber | cauchy | gm | gemanmcclure | dcs
  robust_scale: 1.0              # Huber/Cauchy k, GM c, DCS phi; unused when kernel=none

ekf:
  process_noise_pos: 0.1
  process_noise_vel: 0.5
  process_noise_rot: 0.01
  measurement_noise_pos: 0.05
  measurement_noise_rot: 0.01

mapping:
  master_voxel_size: 0.10      # master cache voxel (m); Stage 4→5 boundary, Stage 5 downsamples from here to voxel_size
                               # Measured: voxel=0.05 triggers OOM on seq 00 (13.7 GB peak > 15 GB RAM)
                               # 0.10 is still finer than working 0.15, peak ~2 GB stays safe
  voxel_size: 0.15             # Stage 5 working voxel (m); matches lane marking width
  max_range: 30.0              # per-frame point cloud max range filter (m); far points are ICP-uncertain
  downsample_every: 500        # trigger incremental merge every N frames
  road_z_min: -2.0             # road surface z lower bound (Velodyne frame, ground ~ -1.73 m)
  road_z_max: -1.5             # road surface z upper bound
  intensity_threshold: 0.40    # lane marking reflectance threshold (KITTI reflectance in [0,1])
  dbscan_eps: 0.7              # DBSCAN cluster radius (m); bridges dashed lane marking fragments
  dbscan_min_points: 40        # min core neighborhood; filters road reflection noise
  curb_grid_size: 0.30         # curb detection xy grid cell size (m); 2× voxel_size to avoid snap aliasing
  curb_z_min: -2.0             # curb z lower bound (matches road_z_min)
  curb_z_max: -1.2             # curb z upper bound (ground + 0.5 m, captures step top edge)
  curb_height_min: 0.10        # min step height (m); 0.08 hits voxel=0.15 snap noise (~0.03 σ)
  curb_height_max: 0.25        # max step height (m); anything taller is classified as wall/vehicle/greenbelt
  curb_road_z_top: -1.55       # road surface top z (m); cell must straddle this z (zmin<=top<zmax) to count as curb
                               # set 5 cm below road_z_max=-1.5 to capture very short (~5 cm) curbs
  curb_dbscan_eps: 0.6         # eps>=0.7 forms 2 m circular blob on sparse candidates (lin~0.7)
                               # eps=0.6 + mp=10 + trim_k=1.2 makes clusters extend along the curb line
                               # Measured (g=0.30 grid): good rate 21% vs 16% at eps=0.5
  curb_dbscan_min_points: 10   # candidates ~2 pts/cell, mp=10 ≈ 5 cells (~1 m along line)
  curb_trim_k: 1.2             # MAD trim tighter than lane (k=2.5), shapes blob into a line
                               # k=1.2 corresponds to ~88% Gaussian retention, trims diagonal spread

export:
  lat0: 49.0                       # synthetic WGS84 origin (near KITTI Karlsruhe); seq 00 has no real GPS
  lon0: 8.4
  polyline_bin_size: 0.5           # m; linear-cluster binning width (shared by lane/curb)
  polyline_simplify_epsilon: 0.05  # m; RDP simplification tolerance; 0 disables; 0.05 is below Velodyne noise
  lane:                            # lane marking classification thresholds (3 PCA tiers: thin/thick/area)
    min_linearity: 0.75            # PCA xy linearity lower bound
    min_length: 1.0                # m; principal-axis span below this is dropped as noise
    line_thin_max_thickness: 0.8   # m; matches natural snap spread of dbscan_eps=0.7 + voxel=0.15
    line_thick_max_thickness: 2.0  # m; beyond this goes to area (crosswalks / intersection paint)
  curb:                            # curb classification thresholds (single category)
                                   # Thresholds based on Stage 5 v4 measurements + stage6-curb-v1/v2/v3 benchmark
                                   # v4 overall: median lin 0.91, median thk 0.46 m, median len 1.4 m
    min_linearity: 0.75            # same as lane; "good" 0.80 is too strict, long-tail lin spans 0.85-0.97
    min_length: 1.0                # m; v4 median 1.4 m, 1.5 m would cut half the clusters; 1.0 is 2× polyline_bin
    max_thickness: 0.7             # m; "good" upper bound raised 0.5 → 0.7; absorbs v4 thickness long tail (max ~1.0 m)
    trim_k: 1.0                    # secondary minor-axis MAD trim sigma factor (Stage 5 v4 already applies k=1.2 trim)
                                   # only applied to clusters that fail solely on thickness after the first PCA
                                   # k=1.0 is tighter than v4; measured seq 06/01/10 recovers 12+4+3 thick-tail clusters

cache:
  enabled: true
  root: "cache/kitti"          # relative to repo root; Stage 1-5 layered cache
                               # see src/cache/layered_cache.py

output:
  dir: "results"
