# hdl_graph_slam parameters tuned for KITTI Velodyne HDL-64E
# LiDAR-only mode: no GPS, no IMU, no floor detection

# Preprocessing
downsample_method: VOXELGRID
downsample_resolution: 0.2

# Registration
registration_method: NDT_OMP
ndt_resolution: 1.0
ndt_num_threads: 4

# Keyframe selection
keyframe_delta_trans: 2.0
keyframe_delta_angle: 0.5

# Graph optimization
g2o_solver_type: lm_var
g2o_solver_num_iterations: 512
graph_update_interval: 3.0

# Loop closure
enable_loop_closure: true
distance_thresh: 30.0
accum_distance_thresh: 15.0
min_edge_interval: 30
fitness_score_max_range: 100.0
fitness_score_thresh: 2.0

# Disable features not available in KITTI Odometry
enable_floor_detection: false
enable_gps: false
enable_imu: false

# Point cloud range
distance_near_thresh: 5.0
distance_far_thresh: 100.0
